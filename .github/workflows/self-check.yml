name: Self-check skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install local wheel
        run: |
          pip install maturin
          pip install .
      - name: Check all example skills
        run: |
          # security-guidance is a meta-skill ABOUT security — it documents
          # dangerous patterns by name, so aif scan correctly flags them.
          # Use aif lint (no security scan) for this one.
          EXIT=0
          for f in examples/skills/*.aif; do
            echo "::group::$f"
            if [[ "$f" == *"security-guidance"* ]]; then
              aif lint "$f" || EXIT=1
            else
              aif check "$f" || EXIT=1
            fi
            echo "::endgroup::"
          done
          exit $EXIT
