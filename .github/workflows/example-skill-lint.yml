# Example workflow showing how downstream repos can use the SkillForge action.
# Copy this file to your own repo at .github/workflows/skill-lint.yml
name: Skill Quality Check

on:
  push:
    paths:
      - '**/SKILL.md'
      - '**/*.aif'
  pull_request:
    paths:
      - '**/SKILL.md'
      - '**/*.aif'

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    name: Lint Agent Skills
    steps:
      - uses: actions/checkout@v4
      - name: SkillForge check
        uses: LiqunChen0606/skillforge@v0.5.0
        with:
          path: .
