# Example workflow showing how downstream repos can use the SkillForge action.
# Copy this file to your own repo at .github/workflows/skill-lint.yml
#
# This workflow is disabled for this repo itself via the manual trigger only
# (our tests/fixtures/ contains parser test files that intentionally fail).
name: Skill Quality Check (example)

on:
  workflow_dispatch:

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    name: Lint Agent Skills
    steps:
      - uses: actions/checkout@v4
      - name: SkillForge check
        uses: LiqunChen0606/skillforge@v0.6.2
        with:
          path: ./skills   # scope to skill files only
